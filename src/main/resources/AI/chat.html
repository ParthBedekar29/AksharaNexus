<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oracle — AksharaNexus</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/chat.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<!-- ── SIDEBAR ── -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <button class="sidebar-new-btn" id="new-chat-btn">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            New chat
        </button>
    </div>
    <div class="sidebar-sessions" id="sidebar-sessions">
        <!-- populated by JS -->
    </div>
</div>

<!-- ── SIDEBAR OVERLAY (mobile) ── -->
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<!-- ── MAIN ── -->
<div class="chat-root">
    <nav class="chat-nav">
        <div class="chat-nav-left">
            <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle history">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <line x1="3" y1="6"  x2="21" y2="6"/>
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <span class="chat-nav-brand">AksharaNexus</span>
            <span class="chat-nav-label">Oracle</span>
        </div>
        <div class="chat-nav-right">
            <span class="chat-nav-user" id="user-name"></span>
            <label class="theme-toggle" title="Toggle theme" aria-label="Toggle light/dark theme">
                <span class="theme-toggle-icon" aria-hidden="true">☀</span>
                <div class="theme-toggle-track">
                    <div class="theme-toggle-thumb"></div>
                </div>
                <span class="theme-toggle-icon" aria-hidden="true">☾</span>
                <input type="checkbox" id="theme-checkbox" hidden>
            </label>
            <a href="account.html" class="chat-nav-account" title="My account">⚙</a>
            <a href="#" class="chat-nav-logout" id="logout-btn">Sign out</a>
        </div>
    </nav>

    <div class="chat-messages" id="chat-messages">
        <div class="chat-empty" id="chat-empty">
            <span class="chat-empty-glyph">𓂀</span>
            <h2>Ask the Oracle</h2>
            <p>Query civilizations, events, governance, trade routes, and more — with cited sources.</p>
        </div>
    </div>

    <div class="chat-input-area">
        <div class="chat-input-wrap">
            <textarea
                    id="chat-input"
                    class="chat-textarea"
                    placeholder="Ask about any civilization…"
                    rows="1"
            ></textarea>
            <button id="send-btn" class="chat-send-btn" aria-label="Send">
                <svg viewBox="0 0 24 24">
                    <line x1="12" y1="19" x2="12" y2="5"/>
                    <polyline points="5 12 12 5 19 12"/>
                </svg>
            </button>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/chat.js"></script>
</body>
</html>
