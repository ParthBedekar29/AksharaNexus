<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot password — AksharaNexus</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body data-page="forgot-password">
<nav class="auth-nav">
    <div class="container">
        <a href="index.html" class="auth-nav-brand">AksharaNexus</a>
        <a href="login.html" class="auth-nav-link">Sign in →</a>
    </div>
</nav>
<div class="auth-body">
    <!-- Request form -->
    <div class="auth-card" id="form-card">
        <h1 class="auth-title">Forgot your password?</h1>
        <p class="auth-sub">Enter your email and we'll send a reset link.</p>
        <div id="auth-error" class="auth-error"></div>
        <form id="auth-form">
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input class="form-input" type="email" id="email" placeholder="you@email.com" required autocomplete="email">
            </div>
            <button type="submit" id="submit-btn" class="btn-submit" data-label="Send reset link">Send reset link</button>
        </form>
        <div class="auth-switch">Remembered it? <a href="login.html">Sign in</a></div>
    </div>

    <!-- Shown after submit -->
    <div class="auth-card auth-success-card" id="success-card" style="display:none">
        <div class="auth-success-icon">📬</div>
        <h1 class="auth-title">Check your inbox</h1>
        <p class="auth-sub" id="success-email-msg"></p>
        <p class="auth-success-note">The link expires in 1 hour. Check your spam folder if you don't see it.</p>
        <a href="login.html" class="btn-submit" style="display:block;text-align:center;text-decoration:none;margin-top:8px">Back to sign in</a>
    </div>
</div>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
