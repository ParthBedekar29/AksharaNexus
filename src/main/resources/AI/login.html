<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — AksharaNexus</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body data-page="login">
<nav class="auth-nav">
    <div class="container">
        <a href="index.html" class="auth-nav-brand">AksharaNexus</a>
        <a href="register.html" class="auth-nav-link">Create account →</a>
    </div>
</nav>
<div class="auth-body">
    <div class="auth-card" id="form-card">
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-sub">Sign in to continue your research</p>
        <div id="auth-error" class="auth-error"></div>
        <button type="button" id="resend-btn" class="resend-btn" style="display:none">
            Resend verification email
        </button>
        <form id="auth-form">
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input class="form-input" type="email" id="email" placeholder="you@email.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">
                    Password
                    <a href="forgot-password.html" class="form-label-link">Forgot password?</a>
                </label>
                <div class="password-wrap">
                    <input class="form-input" type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" class="toggle-pw" aria-label="Toggle password visibility">👁</button>
                </div>
            </div>
            <button type="submit" id="submit-btn" class="btn-submit" data-label="Sign in">Sign in</button>
        </form>
        <div class="auth-switch">Don't have an account? <a href="register.html">Sign up</a></div>
    </div>

    <!-- Shown after resend verification -->
    <div class="auth-card auth-success-card" id="success-card" style="display:none">
        <div class="auth-success-icon">📬</div>
        <h1 class="auth-title">Check your inbox</h1>
        <p class="auth-sub" id="success-email-msg"></p>
        <p class="auth-success-note">The link expires in 24 hours. Check your spam folder if you don't see it.</p>
        <a href="login.html" class="btn-submit" style="display:block;text-align:center;text-decoration:none;margin-top:8px">Back to sign in</a>
    </div>
</div>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
