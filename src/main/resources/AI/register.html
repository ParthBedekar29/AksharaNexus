<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create account — AksharaNexus</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">

</head>
<body data-page="register">
<nav class="auth-nav">
    <div class="container">
        <a href="index.html" class="auth-nav-brand">AksharaNexus</a>
        <a href="login.html" class="auth-nav-link">Sign in →</a>
    </div>
</nav>
<div class="auth-body">
    <div class="auth-card" id="form-card">
        <h1 class="auth-title">Create account</h1>
        <p class="auth-sub">Free to use. No subscription.</p>
        <div id="auth-error" class="auth-error"></div>
        <form id="auth-form">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="firstName">First name</label>
                    <input class="form-input" type="text" id="firstName" placeholder="Parth" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="lastName">Last name</label>
                    <input class="form-input" type="text" id="lastName" placeholder="Bedekar">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input class="form-input" type="email" id="email" placeholder="you@email.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <div class="password-wrap">
                    <input class="form-input" type="password" id="password" placeholder="6+ characters" required autocomplete="new-password">
                    <button type="button" class="toggle-pw" aria-label="Toggle password visibility">👁</button>
                </div>
            </div>
            <button type="submit" id="submit-btn" class="btn-submit" data-label="Create account">Create account</button>
        </form>
        <div class="auth-switch">Already have an account? <a href="login.html">Sign in</a></div>
    </div>

    <!-- Shown after successful registration -->
    <div class="auth-card auth-success-card" id="success-card" style="display:none">
        <div class="auth-success-icon">✉</div>
        <h1 class="auth-title">Check your inbox</h1>
        <p class="auth-sub" id="success-email-msg">We sent a verification link to your email. Click it to activate your account.</p>
        <p class="auth-success-note">The link expires in 24 hours. Check your spam folder if you don't see it.</p>
        <a href="login.html" class="btn-submit" style="display:block;text-align:center;text-decoration:none;margin-top:8px">Back to sign in</a>
    </div>
</div>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
