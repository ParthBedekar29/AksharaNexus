<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset password — AksharaNexus</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">

</head>
<body data-page="reset-password">
<nav class="auth-nav">
    <div class="container">
        <a href="index.html" class="auth-nav-brand">AksharaNexus</a>
    </div>
</nav>
<div class="auth-body">
    <!-- Invalid / missing token -->
    <div class="auth-card auth-success-card" id="invalid-card" style="display:none">
        <div class="auth-success-icon" style="color:#e05a5a">✕</div>
        <h1 class="auth-title">Link invalid or expired</h1>
        <p class="auth-sub">This reset link has already been used or has expired.</p>
        <a href="forgot-password.html" class="btn-submit" style="display:block;text-align:center;text-decoration:none;margin-top:8px">Request a new link</a>
    </div>

    <!-- Reset form -->
    <div class="auth-card" id="form-card" style="display:none">
        <h1 class="auth-title">Set new password</h1>
        <p class="auth-sub">Choose a password you haven't used before.</p>
        <div id="auth-error" class="auth-error"></div>
        <form id="auth-form">
            <div class="form-group">
                <label class="form-label" for="password">New password</label>
                <div class="password-wrap">
                    <input class="form-input" type="password" id="password" placeholder="6+ characters" required autocomplete="new-password">
                    <button type="button" class="toggle-pw" aria-label="Toggle password visibility">👁</button>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label" for="confirm">Confirm password</label>
                <div class="password-wrap">
                    <input class="form-input" type="password" id="confirm" placeholder="••••••••" required autocomplete="new-password">
                    <button type="button" class="toggle-pw" aria-label="Toggle password visibility">👁</button>
                </div>
            </div>
            <button type="submit" id="submit-btn" class="btn-submit" data-label="Reset password">Reset password</button>
        </form>
    </div>

    <!-- Success -->
    <div class="auth-card auth-success-card" id="success-card" style="display:none">
        <div class="auth-success-icon" style="color:#5aaa72">✓</div>
        <h1 class="auth-title">Password updated</h1>
        <p class="auth-sub">Your password has been reset. You can now sign in.</p>
        <a href="login.html" class="btn-submit" style="display:block;text-align:center;text-decoration:none;margin-top:8px">Sign in</a>
    </div>
</div>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
