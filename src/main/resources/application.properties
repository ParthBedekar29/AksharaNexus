spring.application.name=NexusA

# Database
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
reviewer.jwt.secret=${REVIEWER_JWT_SECRET}
reviewer.jwt.expiry-ms=${REVIEWER_JWT_EXPIRY_MS}

# External APIs
ror.base.url=https://api.ror.org
# Important — Railway injects PORT dynamically
server.port=${PORT:8080}

# Your existing Groq key
groq.api.key=${GROQ_API_KEY}