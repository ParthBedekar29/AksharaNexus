<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>AksharaNexus — Forgot Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="login-shell">
    <div class="login-card">
        <div class="login-logo">Akshara<em style="font-style:italic;color:var(--teal)">Nexus</em></div>
        <div class="login-context">Reviewer Portal</div>

        <div id="form-section">
            <h1 class="login-title">Forgot your password?</h1>
            <p class="login-sub">Enter your email and we'll send you a reset link.</p>
            <div class="login-error" id="err"></div>
            <form class="login-form" id="form" onsubmit="return false">
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" placeholder="reviewer@institution.edu" autocomplete="email" required/>
                </div>
                <button class="btn-login" id="btn" type="submit" style="background:var(--teal)">Send Reset Link</button>
            </form>
        </div>

        <div id="success-state" style="display:none;text-align:center;padding:12px 0 8px">
            <div style="font-size:2rem;margin-bottom:14px;color:var(--teal)">📬</div>
            <h2 class="login-title" style="margin-bottom:8px">Check your inbox</h2>
            <p class="login-sub" id="success-msg"></p>
            <a href="login.html" class="btn-login" style="display:inline-block;margin-top:8px;text-decoration:none;text-align:center;background:var(--teal)">Back to Sign in</a>
        </div>

        <p class="login-note">
            Remembered it? <a href="login.html" style="color:var(--teal);font-weight:500">Sign in</a>
        </p>
    </div>
</div>
<script type="module">
    import { forgotPassword } from './api.js';

    const form    = document.getElementById('form');
    const btn     = document.getElementById('btn');
    const err     = document.getElementById('err');

    form.addEventListener('submit', async () => {
        err.classList.remove('show');
        const email = document.getElementById('email').value.trim();
        if (!email) { err.textContent = 'Email is required.'; err.classList.add('show'); return; }

        btn.disabled = true;
        btn.textContent = 'Sending…';

        try {
            await forgotPassword(email);
            document.getElementById('success-msg').innerHTML =
                `We sent a reset link to <strong>${email}</strong>.<br>It expires in 1 hour.`;
            document.getElementById('form-section').style.display = 'none';
            document.getElementById('success-state').style.display = 'block';
        } catch(e) {
            err.textContent = e.message || 'Request failed.';
            err.classList.add('show');
            btn.disabled = false;
            btn.textContent = 'Send Reset Link';
        }
    });
</script>
</body>
</html>
