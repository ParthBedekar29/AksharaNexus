<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>AksharaNexus — Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="login-shell">
    <div class="login-card">
        <div class="login-logo">Akshara<em style="font-style:italic;color:var(--teal)">Nexus</em></div>
        <div class="login-context">Reviewer Portal</div>

        <div id="form-section">
            <h1 class="login-title">Choose a new password</h1>
            <p class="login-sub">At least 8 characters with an uppercase letter, number, and symbol.</p>
            <div class="login-error" id="err"></div>
            <form class="login-form" id="form" onsubmit="return false">
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" id="password" placeholder="••••••••" autocomplete="new-password" required/>
                </div>
                <div class="form-group">
                    <label for="confirm">Confirm Password</label>
                    <input type="password" id="confirm" placeholder="••••••••" autocomplete="new-password" required/>
                </div>
                <button class="btn-login" id="btn" type="submit" style="background:var(--teal)">Reset Password</button>
            </form>
        </div>

        <div id="success-state" style="display:none;text-align:center;padding:12px 0 8px">
            <div style="font-size:2rem;margin-bottom:14px;color:var(--teal)">✦</div>
            <h2 class="login-title" style="margin-bottom:8px">Password reset</h2>
            <p class="login-sub">Your password has been updated. You can now sign in.</p>
            <a href="login.html" class="btn-login" style="display:inline-block;margin-top:8px;text-decoration:none;text-align:center;background:var(--teal)">Sign in</a>
        </div>

        <div id="invalid-state" style="display:none;text-align:center;padding:12px 0 8px">
            <div style="font-size:2rem;margin-bottom:14px;">⚠️</div>
            <h2 class="login-title" style="margin-bottom:8px">Invalid link</h2>
            <p class="login-sub">This reset link is missing or malformed.</p>
            <a href="forgot-password.html" class="btn-login" style="display:inline-block;margin-top:8px;text-decoration:none;text-align:center;background:var(--teal)">Request a new link</a>
        </div>
    </div>
</div>
<script type="module">
    import { resetPassword } from './api.js';

    const params = new URLSearchParams(window.location.search);
    const token  = params.get('token');

    if (!token) {
        document.getElementById('form-section').style.display = 'none';
        document.getElementById('invalid-state').style.display = 'block';
    }

    const form = document.getElementById('form');
    const btn  = document.getElementById('btn');
    const err  = document.getElementById('err');

    form?.addEventListener('submit', async () => {
        err.classList.remove('show');
        const password = document.getElementById('password').value;
        const confirm  = document.getElementById('confirm').value;

        if (password !== confirm) {
            err.textContent = 'Passwords do not match.';
            err.classList.add('show');
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Resetting…';

        try {
            await resetPassword(token, password);
            document.getElementById('form-section').style.display = 'none';
            document.getElementById('success-state').style.display = 'block';
        } catch(e) {
            err.textContent = e.message || 'Reset failed.';
            err.classList.add('show');
            btn.disabled = false;
            btn.textContent = 'Reset Password';
        }
    });
</script>
</body>
</html>
