<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password — AksharaNexus</title>
    <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

<nav class="nav">
    <a href="index.html" class="nav-logo">AksharaNexus</a>
</nav>

<div class="auth-wrap">
    <div class="auth-box">
        <div class="auth-kicker">Password Reset</div>
        <h1>Choose a new password</h1>
        <p class="auth-sub">Make it strong — at least 8 characters with an uppercase letter, number, and symbol.</p>

        <form id="reset-form">
            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" placeholder="Min. 8 chars, 1 uppercase, 1 number, 1 symbol" required autocomplete="new-password" />
            </div>
            <div class="form-group">
                <label for="confirm-password">Confirm New Password</label>
                <input type="password" id="confirm-password" placeholder="Repeat your new password" required autocomplete="new-password" />
            </div>
            <button type="submit" class="btn-submit" id="submit-btn">Reset Password</button>
        </form>

        <div class="auth-footer">
            <span class="auth-footer-line">Remembered it? <a href="login.html">Sign in</a></span>
        </div>
    </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="js/api.js"></script>
<script>
    // Extract token from URL
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    // No token in URL — invalid landing
    if (!token) {
        document.querySelector('.auth-box').innerHTML = `
            <div style="text-align:center; padding: 24px 0;">
                <div style="font-size: 2.5rem; margin-bottom: 16px;">⚠️</div>
                <h2 style="margin-bottom: 8px;">Invalid link</h2>
                <p style="color:#555; margin-bottom: 24px;">This reset link is missing or malformed.</p>
                <a href="forgot-password.html" class="btn-submit" style="display:inline-block; text-decoration:none;">
                    Request a new link
                </a>
            </div>
        `;
    }

    document.getElementById('reset-form')?.addEventListener('submit', async e => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        const password = document.getElementById('password').value;
        const confirm  = document.getElementById('confirm-password').value;

        if (password !== confirm) {
            showToast('Passwords do not match', 'error');
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Resetting…';

        try {
            await AuthAPI.resetPassword(token, password);
            document.getElementById('reset-form').innerHTML = `
                <div style="text-align:center; padding: 24px 0;">
                    <div style="font-size: 2.5rem; margin-bottom: 16px;">✅</div>
                    <h2 style="margin-bottom: 8px;">Password reset</h2>
                    <p style="color:#555; margin-bottom: 24px;">Your password has been updated. You can now sign in.</p>
                    <a href="login.html" class="btn-submit" style="display:inline-block; text-decoration:none;">
                        Sign In
                    </a>
                </div>
            `;
        } catch (err) {
            showToast(err.message || 'Reset failed', 'error');
            btn.disabled = false;
            btn.innerHTML = 'Reset Password';
        }
    });
</script>
</body>
</html>
