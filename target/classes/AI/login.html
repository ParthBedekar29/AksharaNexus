<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — AksharaNexus</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body data-page="login">
<nav class="auth-nav">
    <div class="container">
        <a href="index.html" class="auth-nav-brand">AksharaNexus</a>
        <a href="register.html" class="auth-nav-link">Create account →</a>
    </div>
</nav>
<div class="auth-body">
    <div class="auth-card">
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-sub">Sign in to continue your research</p>
        <div id="auth-error" class="auth-error"></div>
        <form id="auth-form">
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input class="form-input" type="email" id="email" placeholder="you@email.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <div class="password-wrap">
                    <input class="form-input" type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" class="toggle-pw" aria-label="Toggle password visibility">👁</button>
                </div>
            </div>
            <button type="submit" id="submit-btn" class="btn-submit" data-label="Sign in">Sign in</button>
        </form>
        <div class="auth-switch">Don't have an account? <a href="register.html">Sign up</a></div>
    </div>
</div>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
