<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password — AksharaNexus</title>
    <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

<nav class="nav">
    <a href="index.html" class="nav-logo">AksharaNexus</a>
    <div class="nav-right">
        <a href="login.html" class="nav-hide">Sign In</a>
    </div>
</nav>

<div class="auth-wrap">
    <div class="auth-box">
        <a href="login.html" class="auth-back">← Back to sign in</a>
        <div class="auth-kicker">Password Reset</div>
        <h1>Forgot your password?</h1>
        <p class="auth-sub">Enter your institutional email and we'll send you a reset link.</p>

        <form id="forgot-form">
            <div class="form-group">
                <label for="email">Institutional Email</label>
                <input type="email" id="email" placeholder="you@university.edu" required autocomplete="email" />
            </div>

            <!-- Shown only when user selects Admin account type -->
            <div class="form-group" id="account-type-group">
                <label for="account-type">Account Type</label>
                <select id="account-type">
                    <option value="VIEWER">Researcher</option>
                    <option value="ADMIN">Institution Admin</option>
                </select>
            </div>

            <div class="form-group" id="admin-code-group" style="display:none;">
                <label for="adminCode">Secret Admin Key</label>
                <input type="password" id="adminCode" placeholder="Required for admin accounts" autocomplete="off" />
                <small style="color:#888; margin-top:4px; display:block;">
                    Admin accounts require your secret key to request a password reset.
                </small>
            </div>

            <button type="submit" class="btn-submit" id="submit-btn">Send Reset Link</button>
        </form>

        <div class="auth-footer">
            <span class="auth-footer-line">Remembered it? <a href="login.html">Sign in</a></span>
        </div>
    </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="js/api.js"></script>
<script>
    // Toggle admin key field based on account type
    document.getElementById('account-type').addEventListener('change', function () {
        const isAdmin = this.value === 'ADMIN';
        document.getElementById('admin-code-group').style.display = isAdmin ? 'block' : 'none';
        document.getElementById('adminCode').required = isAdmin;
    });

    document.getElementById('forgot-form').addEventListener('submit', async e => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        const email = document.getElementById('email').value.trim();
        const isAdmin = document.getElementById('account-type').value === 'ADMIN';
        const adminCode = isAdmin ? document.getElementById('adminCode').value : null;

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Sending…';

        try {
            await AuthAPI.forgotPassword(email, adminCode);
            document.getElementById('forgot-form').innerHTML = `
                <div style="text-align:center; padding: 24px 0;">
                    <div style="font-size: 2.5rem; margin-bottom: 16px;">📬</div>
                    <h2 style="margin-bottom: 8px;">Check your inbox</h2>
                    <p style="color: #555; margin-bottom: 24px;">
                        We sent a reset link to <strong>${email}</strong>.<br/>
                        It expires in 1 hour.
                    </p>
                    <a href="login.html" class="btn-submit" style="display:inline-block; text-decoration:none;">
                        Back to Sign In
                    </a>
                </div>
            `;
        } catch (err) {
            showToast(err.message || 'Request failed', 'error');
            btn.disabled = false;
            btn.innerHTML = 'Send Reset Link';
        }
    });
</script>
</body>
</html>
