<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — AksharaNexus</title>
    <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

<nav class="nav">
    <a href="index.html" class="nav-logo">AksharaNexus</a>
    <div class="nav-right">
        <a href="register.html" class="nav-hide">Join as Researcher</a>
        <a href="register-admin.html" class="nav-cta">Register Institution</a>
    </div>
</nav>

<div class="auth-wrap">
    <div class="auth-box">

        <a href="index.html" class="auth-back">← Back to home</a>

        <div class="auth-kicker">Sign in</div>
        <h1>Welcome back</h1>
        <p class="auth-sub">Sign in with your institutional credentials to continue.</p>

        <form id="login-form">
            <div class="form-group">
                <label for="email">Institutional Email</label>
                <input type="email" id="email" placeholder="you@university.edu" required autocomplete="email" />
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
            </div>

            <button type="submit" class="btn-submit" id="submit-btn">Sign In</button>
        </form>

        <div class="auth-footer">
            <span class="auth-footer-line">Don't have an account? <a href="register.html">Join as a researcher</a></span>
            <span class="auth-footer-line">Registering an institution? <a href="register-admin.html">Institution registration →</a></span>
        </div>

    </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="js/api.js"></script>
<script>
    if (typeof Auth !== 'undefined' && Auth.getToken()) window.location.href = 'dashboard.html';

    document.getElementById('login-form').addEventListener('submit', async e => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Signing in…';

        try {
            await AuthAPI.login(email, password);
            showToast('Signed in successfully', 'success');
            setTimeout(() => window.location.href = 'dashboard.html', 500);
        } catch (err) {
            showToast(err.message || 'Sign in failed', 'error');
            btn.disabled = false;
            btn.innerHTML = 'Sign In';
        }
    });

    function showToast(message, type = 'info') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transition = '0.2s';
            setTimeout(() => toast.remove(), 200);
        }, 3500);
    }
</script>
</body>
</html>
